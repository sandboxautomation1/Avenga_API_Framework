name: API Automation Tests

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 22
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '22'

      - name: Build Docker image
        run: docker build -t api-tests .

      - name: Run tests in Docker
        run: docker run --name api-container -v ${{ github.workspace }}/test-output:/app/test-output api-tests

      - name: Run tests
        run: mvn clean test

      - name: Prepare report for GitHub Pages
        run:  mkdir public cp -r test-output/* public/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public