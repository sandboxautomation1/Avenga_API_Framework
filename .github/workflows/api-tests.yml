name: API Automation Tests

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 22
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '22'

      - name: Build Docker image
        run: docker build -t api-tests .

      - name: Run tests in Docker
        run: docker run --name api-container -v ${{ github.workspace }}/test-output:/app/test-output api-tests

      - name: Copy reports from container
        run: |
            docker run --name api-container api-tests
            docker create --name temp-container api-tests
            docker rm temp-container

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Automation_Test_Report
          path: test-output/