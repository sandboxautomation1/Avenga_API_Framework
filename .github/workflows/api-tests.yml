name: API Automation Tests

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 22
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '22'

      - name: Build Docker image
        run: docker build -t api-tests .

      - name: Run tests in Docker
        run: docker run -e TZ=Europe/Sofia -v ${{ github.workspace }}/test-output:/app/test-output api-tests

      - name: Copy reports from container
        run: |
            docker run --name api-container api-tests
            docker create --name temp-container api-tests
            docker rm temp-container

      - name: Test Report Generation
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
            name: test-output                 # Name of the folder
            path: test-output     # Path to test results